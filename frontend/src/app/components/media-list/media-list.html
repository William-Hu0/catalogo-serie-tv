<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4 text-white">
    <div>
      <h2 class="fw-bold m-0 text-gradient">🎬 Catalogo Film & Serie TV</h2>
      <p class="text-white small m-0">Gestisci i film e le serie TV presenti nel database cloud</p>
    </div>
    <span class="badge bg-danger px-3 py-2 rounded-pill fs-6">Live Data</span>
  </div>

  <div class="card bg-dark border-secondary mb-4 shadow">
    <div class="card-body p-4">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label text-light small fw-bold">Cerca per Titolo</label>
          <input type="text" class="form-control bg-secondary text-white border-0" 
                 [(ngModel)]="filtroTitolo" (input)="caricaCatalogo()" 
                 placeholder="Cerca per titolo...">
        </div>

        <div class="col-md-3">
          <label class="form-label text-light small fw-bold">Tipo Contenuto</label>
          <select class="form-select bg-secondary text-white border-0" 
                  [(ngModel)]="filtroTipo" (change)="caricaCatalogo()">
            <option value="">Tutti</option>
            <option value="Film">🎬 Film</option>
            <option value="SerieTV">📺 Serie TV</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label text-light small fw-bold">Genere</label>
          <select class="form-select bg-secondary text-white border-0" 
                  [(ngModel)]="filtroGenere" (change)="caricaCatalogo()">
            <option value="">Tutti i generi</option>
            <option value="1">Azione</option>
            <option value="2">Avventura</option>
            <option value="3">Commedia</option>
            <option value="4">Dramma</option>
            <option value="5">Fantasy</option>
            <option value="6">Horror</option>
            <option value="7">Sci-Fi</option>
            <option value="8">Thriller</option>
            <option value="9">Documentario</option>
            <option value="10">Animazione</option>
            <option value="11">Crime</option>
            <option value="12">Romantico</option>
            <option value="13">Storico</option>
            <option value="14">Biografico</option>
            <option value="15">Musical</option>
            <option value="16">Western</option>
            <option value="17">Sportivo</option>
            <option value="18">Guerra</option>
            <option value="19">Mistero</option>
            <option value="20">Soprannaturale</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label text-light small fw-bold">Anno di Uscita</label>
          <input type="number" class="form-control bg-secondary text-white border-0" 
                 [(ngModel)]="filtroAnno" (input)="caricaCatalogo()" 
                 placeholder="Anno di uscita">
        </div>

        <div class="col-md-3">
          <label class="form-label text-light small fw-bold">Piattaforma Streaming</label>
          <select class="form-select bg-secondary text-white border-0" 
                  [(ngModel)]="filtroPiattaforma" (change)="caricaCatalogo()">
            <option value="">Tutte le piattaforme</option>
            @for (piattaforma of elencoPiattaforme; track piattaforma.id_piattaforma) {
              <option [value]="piattaforma.id_piattaforma">{{ piattaforma.nome }}</option>
            }
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="card bg-dark border-secondary shadow overflow-hidden">
    <div class="table-responsive">
      <table class="table table-dark table-hover align-middle m-0 text-center">
        <thead class="table-secondary text-uppercase fs-7 tracking-wider">
          <tr>
            <th scope="col" class="py-3 text-start ps-4">Titolo</th>
            <th scope="col" class="py-3">Anno</th>
            <th scope="col" class="py-3">Voto</th>
            <th scope="col" class="py-3">Azioni</th>
          </tr>
        </thead>
        <tbody>
          @for (item of elencoMedia; track item.id_media) {
            <tr>
              <td class="text-start fw-semibold ps-4">
                <a [routerLink]="['/media', item.id_media]" class="text-info text-decoration-none href-link">
                  {{ item.titolo }}
                </a>
              </td>
              <td><span class="badge bg-secondary">{{ item.anno_uscita }}</span></td>
              <td>
                <span class="text-warning fw-bold">⭐ {{ item.voto_medio }}</span><span class="small text-muted">/10</span>
              </td>
              <td>
                <button class="btn btn-sm btn-outline-warning px-3 rounded-pill me-2" [routerLink]="['/media', item.id_media]">
                  ✏️ Modifica
                </button>
                <button class="btn btn-sm btn-outline-danger px-3 rounded-pill" (click)="eliminaFilm(item.id_media)">
                  ❌ Elimina
                </button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="4" class="py-5 text-muted">
                Nessun contenuto trovato nel catalogo.
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
