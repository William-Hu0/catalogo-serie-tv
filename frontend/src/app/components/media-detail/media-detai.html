<app-navbar></app-navbar>

<div class="container mt-4" *ngIf="media">

  <div class="card shadow">

    <div class="card-body">

      <h2>{{ media.nome || media.titolo }}</h2>

      <hr>

      <p><b>ID:</b> {{ media.id_media }}</p>
      <p><b>Anno:</b> {{ media.anno }}</p>
      <p><b>Tipo:</b> {{ media.tipo }}</p>

    </div>

  </div>

</div>
